services:
  panel:
    build:
      context: ..
      dockerfile: docker/Dockerfile.panel
    container_name: ace-panel
    ports:
      - "${PANEL_PORT:-4300}:${PANEL_PORT:-4300}"
    volumes:
      # Fichiers ACE EVO (configs, résultats) — partagé avec le serveur de jeu
      - ./aceserver:/aceserver
      # Base de données et données persistantes du panel
      - panel_data:/panel/data
      # Docker socket pour contrôler le container aceserver depuis le panel
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    restart: unless-stopped

  aceserver:
    build:
      context: .
      dockerfile: Dockerfile.aceserver
    container_name: ace-server
    ports:
      - "8080:8080"       # API HTTP du serveur de jeu
      - "9700:9700/tcp"   # Connexions joueurs TCP
      - "9700:9700/udp"   # Connexions joueurs UDP
    volumes:
      # Même volume partagé que le panel — le panel y écrit les configs, le serveur les lit
      - ./aceserver:/aceserver
      # Prefix Wine persistant entre les redémarrages
      - wine_prefix:/root/.wine
    env_file:
      - .env
    security_opt:
      - seccomp:unconfined   # Wine a besoin de personality() syscall (PER_LINUX32) pour WoW64
    restart: "no"            # Cycle de vie géré par le panel (watchdog interne)

volumes:
  panel_data:
  wine_prefix:
