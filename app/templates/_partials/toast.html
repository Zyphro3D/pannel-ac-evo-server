<div x-data="{ show: true }"
     x-show="show"
     x-init="setTimeout(() => show = false, 4500)"
     x-transition
     class="toast-htmx toast-htmx-{{ type }}"
     role="alert"
     aria-live="polite">
  <span>{{ message }}</span>
  <button @click="show = false" class="toast-htmx-close" aria-label="{{ _('Fermer') }}">✕</button>
</div>
