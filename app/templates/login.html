{% extends "base.html" %}
{% block title %}{{ _('Connexion') }} — AC EVO Panel{% endblock %}
{% block content %}
<div class="login-wrapper">
  <div class="login-box">
    <div class="login-logo">
      <span class="brand-evo">EVO</span>
      <span class="brand-panel">PANEL</span>
    </div>
    <p class="login-sub">{{ _('Administration serveur') }}</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-error">{{ _('Identifiants incorrects') }}</div>
      {% endif %}
    {% endwith %}

    <form method="post" class="login-form">
      <div class="form-group">
        <label>{{ _('Utilisateur') }}</label>
        <input type="text" name="username" autofocus required>
      </div>
      <div class="form-group">
        <label>{{ _('Mot de passe') }}</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn-primary full-width">{{ _('Connexion') }}</button>
    </form>
  </div>
</div>
{% endblock %}
