{% extends "base.html" %}
{% block title %}{{ _('Connexion') }} — {{ panel_title }}{% endblock %}
{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 80px)">
  <div class="auth-card">
    <div class="auth-logo">
      {% if panel_logo_img %}
        <img src="{{ url_for('serve_media', filename='banner/' ~ panel_logo_img) }}" style="max-height:60px;object-fit:contain;margin-bottom:8px" alt="">
      {% else %}
        <span class="b-evo">EVO</span>
        <span class="b-panel">Panel</span>
      {% endif %}
    </div>
    <h2 class="auth-title">{{ _('Connexion') }}</h2>

    <form method="post" id="login-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>{{ _('Identifiant ou email') }}</label>
        <input class="form-control" type="text" name="username" id="username-input" autofocus required autocomplete="username">
      </div>
      <div class="form-group">
        <label>{{ _('Mot de passe') }}</label>
        <input class="form-control" type="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:4px">{{ _('Connexion') }}</button>
    </form>

    <div class="auth-footer">
      {{ _('Pilote ?') }} <a href="{{ url_for('public.register') }}">{{ _("S'inscrire") }}</a>
      &nbsp;·&nbsp;
      <a href="{{ url_for('auth.forgot_password') }}" style="color:var(--dim)">{{ _('Mot de passe oublié ?') }}</a>
    </div>
  </div>
</div>
<script nonce="{{ csp_nonce }}">
(function () {
  const input = document.getElementById('username-input');
  const saved = localStorage.getItem('ace_login_username');
  if (saved && !input.value) input.value = saved;
  document.getElementById('login-form').addEventListener('submit', function () {
    localStorage.setItem('ace_login_username', input.value);
  });
})();
</script>
{% endblock %}
