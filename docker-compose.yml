services:
  dockerproxy:
    image: ghcr.io/tecnativa/docker-socket-proxy@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    container_name: ace-docker-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Seules les opérations nécessaires au panel sont autorisées
      CONTAINERS: 1
      POST: 1
      ALLOW_START: 1
      ALLOW_STOP: 1
      ALLOW_RESTARTS: 1
      # Tout le reste est refusé
      IMAGES: 0
      NETWORKS: 0
      VOLUMES: 0
      BUILD: 0
      EXEC: 0
      SWARM: 0
      AUTH: 0
      SECRETS: 0
    networks:
      - dockerproxy
    restart: unless-stopped

  panel:
    build:
      context: .
      dockerfile: Dockerfile.panel
      args:
        GIT_HASH: "${GIT_HASH:-}"
    container_name: ace-panel
    ports:
      - "${PANEL_PORT:-4300}:${PANEL_PORT:-4300}"
    volumes:
      # Fichiers ACE EVO (configs, résultats) — partagé avec le serveur de jeu
      - ./aceserver:/aceserver
      # Base de données et données persistantes du panel
      - panel_data:/panel/data
      # Images véhicules et circuits uploadées manuellement
      - ./media:/panel/media
      # Fichier de configuration .env — monté pour que la page Paramètres lise/écrive les vraies valeurs
      - ./.env:/panel/.env
      # SteamCMD (mise à jour du serveur de jeu depuis le panel)
      - /opt/steamcmd:/opt/steamcmd
      # Session Steam authentifiée du host (pour accéder aux apps nécessitant un compte)
      - ${HOME}/Steam:/root/Steam
      # HTTPS intégré (Let's Encrypt) — décommentez et adaptez SSL_CERTFILE/SSL_KEYFILE dans .env
      # - /etc/letsencrypt:/etc/letsencrypt:ro
      # Fichier override Docker Compose — le panel le régénère à chaque création/suppression de serveur
      # create_host_path: false — si le fichier est absent, Docker refuse de démarrer au lieu de
      # créer un dossier à sa place (voir CHANGELOG v1.9.0)
      - type: bind
        source: ./docker-compose.override.yml
        target: /panel/docker-compose.override.yml
        bind:
          create_host_path: false
    environment:
      DOCKER_HOST: tcp://dockerproxy:2375
    env_file:
      - .env
    networks:
      - dockerproxy
      - default
    depends_on:
      - dockerproxy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:${PANEL_PORT:-4300}/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  aceserver:
    build:
      context: .
      dockerfile: Dockerfile.aceserver
    container_name: ace-server
    ports:
      - "8081:8081"       # API HTTP du serveur de jeu (port officiel ACE EVO)
      - "9700:9700/tcp"   # Connexions joueurs TCP
      - "9700:9700/udp"   # Connexions joueurs UDP
    volumes:
      # Même volume partagé que le panel — le panel y écrit les configs, le serveur les lit
      - ./aceserver:/aceserver
      # Prefix Wine persistant entre les redémarrages
      - wine_prefix:/root/.wine
    env_file:
      - .env
    security_opt:
      - seccomp:unconfined   # Wine a besoin de personality() syscall (PER_LINUX32) pour WoW64
    restart: "no"            # Cycle de vie géré par le panel (watchdog interne)

volumes:
  panel_data:
  wine_prefix:

networks:
  dockerproxy:
    internal: true   # le proxy n'est pas accessible depuis l'extérieur
